apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-tf-to-helm-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: krateo-tf-to-helm-agent
    app.kubernetes.io/part-of: krateo-codegen-agents
spec:
  type: Declarative
  description: >-
    Translates Terraform configurations into Helm charts.
  declarative:
    deployment:
      env:
{{- include "krateo-tf-to-helm-agent.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.modelConfig }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-tf-to-helm-agent-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/tf_to_helm_agent"}}`}}
    tools:
{{- if .Values.github.enabled }}
      - type: McpServer
        mcpServer:
          name: {{ .Values.github.mcpServer }}
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - get_file_contents
            - search_code
            - search_repositories
            - create_or_update_file
            - push_files
{{- end }}
    deployment:
      resources:
{{- toYaml .Values.resources | nindent 8 }}
