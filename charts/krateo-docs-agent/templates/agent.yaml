apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-docs-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: krateo-docs-agent
    app.kubernetes.io/part-of: krateo-codegen-agents
spec:
  type: Declarative
  description: >-
    Answers overall-platform and general Krateo questions (what Krateo is, how the pieces fit,
    architecture, install model) grounded in a baked platform overview and live cluster reads.
    Domain-specific questions belong to the component agents, which own their own docs.
  declarative:
    deployment:
      env:
{{- include "krateo-docs-agent.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.modelConfig.name }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-docs-agent-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/docs_agent"}}`}}
    tools:
{{- if .Values.clusterReads.enabled }}
      # Read-only cluster inspection, to answer "what's running / how is the platform" live.
      - type: McpServer
        mcpServer:
          name: {{ .Values.clusterReads.mcpServer }}
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_available_api_resources
{{- end }}
{{- if .Values.fetch.enabled }}
      # Tokenless doc reading: GET any public docs/llms.txt URL -> markdown, for deeper/cross-component
      # platform questions on demand (the baked overview is the primary grounding).
      - type: McpServer
        mcpServer:
          name: {{ .Values.fetch.mcpServer }}
          kind: MCPServer
          apiGroup: kagent.dev
          toolNames:
            - fetch
{{- end }}
    deployment:
      resources:
{{- toYaml .Values.resources | nindent 8 }}
